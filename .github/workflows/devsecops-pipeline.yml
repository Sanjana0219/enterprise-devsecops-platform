name: Enterprise DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  detect-stack:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "enterprise-devsecops-platform"
          path: "./customer-app"
          format: "HTML"

      - name: Run Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "./customer-app"
          format: table
          output: trivy-report.txt
        continue-on-error: true

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./customer-app
        continue-on-error: true

      - name: Run OPA Policy Gate
        run: bash scripts/policy-check.sh
        continue-on-error: true

      - name: Send Email Notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "Enterprise DevSecOps Pipeline Failed"
          to: patkotwarsanjana@gmail.com
          from: patkotwarsanjana@gmail.com
          body: |
            Enterprise DevSecOps Alert

            HIGH or CRITICAL vulnerabilities detected.

            Pipeline execution failed.

            Manual approval required before deployment.

      - name: Run Stack Detection
        run: bash scripts/detect-stack.sh

      - name: Install Python Dependencies
        run: |
          pip install openpyxl

      - name: Generate Excel Security Report
        run: |
          python scripts/generate-report.py

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.xlsx

  deploy:

    needs: detect-stack

    if: always()

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Deploy Approval Stage
        run: |
          echo "Deployment approved"
          echo "Ready for EKS deployment"
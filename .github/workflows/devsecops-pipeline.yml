name: Enterprise DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  detect-stack:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------
      # LOGIN TO DOCKER HUB
      # -----------------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------
      # BUILD DOCKER IMAGE
      # -----------------------------

      - name: Build Docker Image
        run: |
          docker build -t sanjana0219/fitness-tracker:latest ./customer-app

      # -----------------------------
      # PUSH IMAGE TO DOCKER HUB
      # -----------------------------

      - name: Push Docker Image
        run: |
          docker push sanjana0219/fitness-tracker:latest

      # -----------------------------
      # SECRET SCANNING
      # -----------------------------

      - name: Run GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      # -----------------------------
      # STATIC CODE ANALYSIS
      # -----------------------------

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -----------------------------
      # DEPENDENCY SCANNING
      # -----------------------------

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "enterprise-devsecops-platform"
          path: "./customer-app"
          format: "HTML"
        continue-on-error: true

      # -----------------------------
      # SNYK SECURITY GATE
      # -----------------------------

      - name: Run Snyk Scan
        uses: snyk/actions/node@v3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects

      # -----------------------------
      # TRIVY CONTAINER SECURITY
      # -----------------------------

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: "./customer-app"
          format: table
          output: trivy-report.txt

      # -----------------------------
      # IaC SECURITY SCAN
      # -----------------------------

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./customer-app
        continue-on-error: true

      # -----------------------------
      # POLICY GOVERNANCE GATE
      # -----------------------------

      - name: Run OPA Policy Gate
        run: bash scripts/policy-check.sh

      # -----------------------------
      # EMAIL ALERT ON FAILURE
      # -----------------------------

      - name: Send Email Notification
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "Enterprise DevSecOps Security Alert"
          to: patkotwarsanjana@gmail.com
          from: patkotwarsanjana@gmail.com
          body: |
            Enterprise DevSecOps Security Alert

            HIGH or CRITICAL vulnerabilities were detected.

            Deployment has been blocked automatically.

            Please review:
            - Snyk findings
            - Trivy findings
            - OPA governance violations
            - Security report artifact

            Fix vulnerabilities before re-deployment.

      # -----------------------------
      # STACK DETECTION
      # -----------------------------

      - name: Run Stack Detection
        run: bash scripts/detect-stack.sh

      # -----------------------------
      # PYTHON DEPENDENCIES
      # -----------------------------

      - name: Install Python Dependencies
        run: |
          pip install openpyxl

      # -----------------------------
      # GENERATE EXCEL REPORT
      # -----------------------------

      - name: Generate Excel Security Report
        run: |
          python scripts/generate-report.py

      # -----------------------------
      # UPLOAD REPORT
      # -----------------------------

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.xlsx

  # ==========================================
  # DEPLOYMENT JOB
  # ONLY RUNS IF SECURITY PASSES
  # ==========================================

  deploy:

    needs: detect-stack

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------
      # AWS AUTHENTICATION
      # -----------------------------

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # INSTALL KUBECTL
      # -----------------------------

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # -----------------------------
      # CONNECT TO EKS
      # -----------------------------

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name enterprise-devsecops-cluster

      # -----------------------------
      # DEPLOY MONGODB
      # -----------------------------

      - name: Deploy MongoDB
        run: |
          kubectl apply -f customer-app/mongodb-deployment.yaml

      # -----------------------------
      # DEPLOY APPLICATION
      # -----------------------------

      - name: Deploy Application
        run: |
          kubectl apply -f customer-app/app-deployment.yaml

      # -----------------------------
      # DEPLOY LOADBALANCER SERVICE
      # -----------------------------

      - name: Deploy Service
        run: |
          kubectl apply -f eks/service.yaml

      # -----------------------------
      # VERIFY DEPLOYMENT
      # -----------------------------

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get svc
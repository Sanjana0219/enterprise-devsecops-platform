apiVersion: apps/v1
kind: Deployment

metadata:
  name: fitness-tracker-app
  namespace: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fitness-tracker-app

  template:
    metadata:
      labels:
        app: fitness-tracker-app

    spec:
      automountServiceAccountToken: false

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: fitness-tracker-app

          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: MONGODB_URI
              value: mongodb://mongodb-service:27017/fitness-tracker

            - name: PORT
              value: "5000"

            - name: HOST
              value: "0.0.0.0"

            - name: NODE_ENV
              value: "production"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000

            capabilities:
              drop:
                - ALL

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: fitness-tracker-service
  namespace: production

spec:
  selector:
    app: fitness-tracker-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000

  type: LoadBalancer